name: Scraper

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Scrape type'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node src/index.js --type=${{ inputs.type || 'incremental' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_KEY }}
